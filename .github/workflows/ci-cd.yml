name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Backend tests
        run: npm run test:backend

      - name: Admin typecheck
        run: npm --workspace tricycall/admin run typecheck

      - name: Rider typecheck
        run: npm --workspace tricycall/rider run typecheck

      - name: Security audit
        run: npm audit --audit-level=high

  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DO_SSH_PRIVATE_KEY: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          DO_HOST: ${{ secrets.DO_HOST }}
        run: |
          : "${DO_SSH_PRIVATE_KEY:?Missing DO_SSH_PRIVATE_KEY secret}"
          : "${DO_HOST:?Missing DO_HOST secret}"
          mkdir -p ~/.ssh
          printf '%s\n' "$DO_SSH_PRIVATE_KEY" > ~/.ssh/digitalocean
          chmod 600 ~/.ssh/digitalocean
          ssh-keyscan -H "$DO_HOST" >> ~/.ssh/known_hosts

      - name: Sync files to droplet
        env:
          DO_USER: ${{ secrets.DO_USER }}
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_APP_DIR: ${{ secrets.DO_APP_DIR }}
        run: |
          : "${DO_USER:?Missing DO_USER secret}"
          : "${DO_HOST:?Missing DO_HOST secret}"
          : "${DO_APP_DIR:?Missing DO_APP_DIR secret}"
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='node_modules/' \
            --exclude='*.log' \
            -e "ssh -i ~/.ssh/digitalocean" \
            ./ "$DO_USER@$DO_HOST:$DO_APP_DIR/"

      - name: Install and reload PM2
        env:
          DO_USER: ${{ secrets.DO_USER }}
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_APP_DIR: ${{ secrets.DO_APP_DIR }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
        run: |
          : "${DO_USER:?Missing DO_USER secret}"
          : "${DO_HOST:?Missing DO_HOST secret}"
          : "${DO_APP_DIR:?Missing DO_APP_DIR secret}"
          : "${PM2_APP_NAME:?Missing PM2_APP_NAME secret}"
          ssh -i ~/.ssh/digitalocean "$DO_USER@$DO_HOST" << EOF
            set -e
            cd "$DO_APP_DIR"
            npm ci --omit=dev
            command -v pm2 >/dev/null 2>&1 || npm install -g pm2
            pm2 describe "$PM2_APP_NAME" >/dev/null 2>&1 \
              && pm2 reload "$PM2_APP_NAME" --update-env \
              || pm2 start npm --name "$PM2_APP_NAME" -- --workspace tricycall/backend run start
            pm2 save
          EOF
